# ================================
# Application Configuration
# ================================
spring.application.name=bus-booking-app
server.port=2020
server.servlet.context-path=/api

# ================================
# Database Configuration
# ================================
spring.datasource.url=jdbc:mysql://localhost:3306/bus_booking_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&zeroDateTimeBehavior=convertToNull
spring.datasource.username=root
spring.datasource.password=Nikhilesh@2004
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ================================
# JPA / Hibernate Configuration
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.sql.init.mode=always

# ================================
# JWT Configuration
# ================================
app.jwt.secret=busbooking-super-secret-key-2024-enterprise-grade-jwt-secret-key-minimum-256-bits
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# ================================
# Email Configuration (Gmail SMTP)
# ================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=saichandhan95155@gmail.com
spring.mail.password=otzr quuo gpst ojwd
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.from=BusTix <saichandhan95155@gmail.com>

# ================================
# File Upload
# ================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ================================
# Logging
# ================================
logging.level.root=INFO
logging.level.com.busbooking=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.config=classpath:logback-spring.xml

# ================================
# Actuator
# ================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ================================
# CORS (configured in code)
# ================================
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:3000

# ================================
# Application Business Config
# ================================
app.seat.lock-duration-minutes=10
app.booking.cancellation-hours=2
app.frontend.url=http://localhost:5173
